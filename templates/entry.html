{% extends "base.html" %}
{% block content %}
<h1>Log Sleep Entry</h1>

{% if message %}
<p class="message">{{ message }}</p>
{% endif %}

<form method="POST">
    <label for="date">Date (TOB date):</label>
    <input type="date" id="date" name="date" value="{{ today }}" required><br><br>

    <label for="ttb">TTB (time to bed, e.g. 1030 or -120):</label>
    <input type="number" id="ttb" name="ttb" required><br><br>

    <label for="sl">SL (sleep latency, minutes):</label>
    <input type="number" id="sl" name="sl" required><br><br>

    <label for="noa">NOA (number of awakenings):</label>
    <input type="number" id="noa" name="noa" required><br><br>

    <label for="waso">WASO (minutes awake during night):</label>
    <input type="number" id="waso" name="waso" required><br><br>

    <label for="ema">EMA (minutes awake before getting up):</label>
    <input type="number" id="ema" name="ema" required><br><br>

    <label for="tob">TOB (time out of bed, e.g. 715 or -100):</label>
    <input type="number" id="tob" name="tob" required><br><br>

    <label for="notes">Notes (optional):</label>
    <input type="text" id="notes" name="notes"><br><br>

    <button type="submit">Save Entry</button>
</form>
{% endblock %}
